services:
  mysql:
    image: mysql:8.4
    container_name: techcv-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: techcv_app
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/migrations/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-ppassword"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
